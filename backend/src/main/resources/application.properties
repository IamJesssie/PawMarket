# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=jdbc:postgresql://db.your-supabase-url.com:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=your-database-password

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Supabase Configuration
supabase.url=https://your-project-ref.supabase.co
supabase.anon-key=your-supabase-anon-key
supabase.service-key=your-supabase-service-key

# JWT Configuration
jwt.secret=your-jwt-secret-key-here-make-it-very-long-and-secure
jwt.expiration=86400000

# CORS Configuration for React frontend
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging
logging.level.com.pawmarket=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB